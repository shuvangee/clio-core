# Pipeline: DeepDriveMD workload, Apptainer + sbatch on Ares, 4 nodes,
# writing directly to NFS under ${HOME}/jarvis-runs/deepdrivemd_nfs_4n.
#
# NFS-baseline counterpart to deepdrivemd_iowarp_libfuse_4n.yaml — same
# SIF, same workload params, same scheduler, same parallel-rep config;
# no IOWarp stack, out goes to NFS.

name: deepdrivemd_nfs_4n

install_manager: container
container_engine: apptainer
container_image: deepdrivemd_apptainer_test

container_binds:
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  DDMD_MD_BYTES: "1073741824"
  DDMD_MD_BS:    "8388608"

scheduler:
  name: slurm
  job_name: deepdrivemd_nfs_4n
  nodes: 4
  ntasks_per_node: 24
  partition: compute
  nodelist: "ares-comp-[10-13]"
  # RADICAL Pilot setup is heavy (sandbox creation, tmgr scheduling) and
  # the previous 4-min cap saw all 16 MD tasks SCHEDULED but not finished.
  # Bump to 20 min and trim workload; can tighten once we measure.
  time: "00:20:00"
  output: slurm-%j.out
  error: slurm-%j.err
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'mkdir -p /home/llogan/jarvis-runs/deepdrivemd_nfs_4n'

pkgs:
  - pkg_type: builtin.deepdrivemd
    pkg_name: deepdrivemd
    nprocs: 4
    ppn: 4
    iterations: 1
    # Trim from 20 → 4 MD tasks per replicate. RADICAL Pilot's overhead
    # per task is significant; 8 reps × 20 tasks = 160 tasks didn't fit
    # in the 4-min cap. 4 reps × 4 tasks = 16 tasks should fit comfortably.
    num_tasks: 4
    replicates: 4
    parallel_reps: 2
    omp_threads: 4
    out: ${HOME}/jarvis-runs/deepdrivemd_nfs_4n
