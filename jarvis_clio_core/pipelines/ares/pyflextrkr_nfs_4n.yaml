# Pipeline: PyFLEXTRKR workload, Apptainer + sbatch on Ares, 4 nodes,
# writing directly to NFS under ${HOME}/jarvis-runs/pyflextrkr_nfs_4n.
#
# NFS-baseline counterpart to pyflextrkr_iowarp_libfuse_4n.yaml — same
# SIF, real /opt/run_demo.sh (mcs_imerg), same parallel-rep config;
# no IOWarp stack, out goes to NFS.

name: pyflextrkr_nfs_4n

install_manager: container
tmp_bind_root: "/mnt/nvme/${USER}"
container_engine: apptainer
container_image: pyflextrkr_apptainer_test

container_binds:
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"

scheduler:
  name: slurm
  job_name: pyflextrkr_nfs_4n
  nodes: 4
  ntasks_per_node: 24
  partition: compute
  nodelist: "ares-comp-[14-17]"
  time: "00:15:00"
  output: slurm-%j.out
  error: slurm-%j.err
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'mkdir -p /home/llogan/jarvis-runs/pyflextrkr_nfs_4n'

pkgs:
  - pkg_type: builtin.pyflextrkr
    pkg_name: pyflextrkr
    nprocs: 1
    ppn: 1
    demo: mcs_imerg
    replicates: 8
    parallel_reps: 2
    omp_threads: 4
    # Demo writes per-rep data tree under data_root; default /output is
    # the apptainer container's NFS overlay, which collides under parallel
    # reps across hosts (PermissionError). Per-host /dev/shm avoids it.
    data_root: /dev/shm/pyflextrkr-data
    out: ${HOME}/jarvis-runs/pyflextrkr_nfs_4n
