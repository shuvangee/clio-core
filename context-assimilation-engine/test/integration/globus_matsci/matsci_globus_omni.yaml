# OMNI Configuration File for Globus Materials Science Data Transfer
#
# This OMNI file demonstrates transferring data from a Globus endpoint to the local filesystem
# using the Content Assimilation Engine (CAE).
#
# Dataset: AFRL Challenge Data - Publication 1151 Input Data
# Endpoint ID: 82f1b5c6-6e9b-11e5-ba47-22000b92c6ec
# Browse: https://app.globus.org/file-manager?origin_id=82f1b5c6-6e9b-11e5-ba47-22000b92c6ec&origin_path=%2Fafrl-challenge-data%2Fpublished%2Fpublication_1151%2Fdata%2FInput+Data%2F
#
# Prerequisites:
# - Valid GLOBUS_ACCESS_TOKEN environment variable
# - Network connectivity to Globus services

version: "1.0"

transfers:
  - src: "globus://82f1b5c6-6e9b-11e5-ba47-22000b92c6ec/afrl-challenge-data/published/publication_1151/data/Input Data/HomeIn-Build B.csv"
    dst: "file::/tmp/globus_matsci/HomeIn-Build_B.csv"
    format: "binary"
    src_token: "${GLOBUS_ACCESS_TOKEN}"

  - src: "globus://82f1b5c6-6e9b-11e5-ba47-22000b92c6ec/afrl-challenge-data/published/publication_1151/data/Input Data/Build B Question Item Conditions.xlsx"
    dst: "file::/tmp/globus_matsci/Build_B_Question_Item_Conditions.xlsx"
    format: "binary"
    src_token: "${GLOBUS_ACCESS_TOKEN}"
