# CLIO Runtime repository configuration.
# Read by read_repo_namespace() in cmake/ClioCoreCommon.cmake to set
# CLIO_RUN_NAMESPACE. Without this file the function falls through to a
# hardcoded fallback and CLIO_RUN_NAMESPACE ends up as the legacy
# project name, which then breaks the install(EXPORT) GPU-target check
# in CMakeLists.txt.
name: runtime
namespace: clio_run
version: 1.0.0
description: CLIO Runtime - task dispatch, IPC, ChiMod orchestration
