# Montage benchmark - NFS baseline (no CTE).
#
# Real montage pipeline inside the prebuilt montage_apptainer_test SIF.
# Output goes to plain NFS at $HOME/jarvis-runs/montage_nfs_big. Used
# as the reference timing for the CTE-FUSE variant
# (montage_cte_fuse_big.yaml).
#
# Size knob: MONTAGE_SIZE (region degrees) — 1.5 produces a multi-GB
# mosaic; bump to 2.0 / 3.0 for tens of GB. Region defaults to M17;
# any size != 0.2 forces a runtime fetch from 2MASS/IRSA.
#
# Scratch lives under $HOME (not /tmp — small `/` on this host) and is
# bind-mounted so the in-container intermediates land on NFS too.
# That makes the "NFS" comparison apples-to-apples with CTE: both
# write all data to durable storage.

name: montage_nfs_big

# Strip LD_LIBRARY_PATH before invoking ssh so the host /usr/bin/ssh
# uses system libcrypto rather than the conda env's (version mismatch
# otherwise). Only takes effect on multi-node deployments.
ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

install_manager: container
container_engine: apptainer
container_image: montage_apptainer_test

container_binds:
  # Bind-mount the updated run_mosaic.sh from host so we can iterate
  # without rebuilding the SIF.
  - ${HOME}/run_mosaic_big.sh:/opt/run_mosaic.sh:ro
  # Bind output + scratch dirs.
  - ${HOME}/jarvis-runs/montage_nfs_big:${HOME}/jarvis-runs/montage_nfs_big
  - ${HOME}/montage-scratch-nfs:${HOME}/montage-scratch-nfs

pkgs:
  - pkg_type: builtin.montage
    pkg_name: montage
    nprocs: 1
    ppn: 1
    region: M17
    band: j
    size: 1.5
    scratch_dir: ${HOME}/montage-scratch-nfs
    out: ${HOME}/jarvis-runs/montage_nfs_big
