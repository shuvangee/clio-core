# Pipeline: RNA-Seq STAR + DESeq2 workload, Apptainer + sbatch on Ares,
# 4 nodes, writing directly to NFS under
# ${HOME}/jarvis-runs/rna_seq_star_deseq2_nfs_4n.
#
# NFS-baseline counterpart to rna_seq_star_deseq2_iowarp_libfuse_4n.yaml
# — same SIF, real /opt/run_rnaseq.sh (snakemake STAR + DESeq2), same
# parallel-rep config; no IOWarp stack, out goes to NFS.

name: rna_seq_star_deseq2_nfs_4n

install_manager: container
tmp_bind_root: "/mnt/nvme/${USER}"
container_engine: apptainer
container_image: rna_seq_star_deseq2_apptainer_test

container_binds:
  - ${HOME}/jarvis-runs:${HOME}/jarvis-runs

ssh_cmd: "env -u LD_LIBRARY_PATH ssh"

mpi_cmd: 'mpiexec --mca btl_tcp_if_include enp47s0np0 --mca oob_tcp_if_include eno1 --prtemca prte_if_include eno1 --prtemca prte_tmpdir_base /home/llogan/iowarp_prte_tmp'

env:
  TMPDIR: "/home/llogan/iowarp_prte_tmp"
  RNASEQ_BAM_GB: "5"
  RNASEQ_TSV_MB: "64"

scheduler:
  name: slurm
  job_name: rna_seq_nfs_4n
  nodes: 4
  ntasks_per_node: 24
  partition: compute
  nodelist: "ares-comp-[18-21]"
  # snakemake's `--use-conda` downloads/installs fresh conda envs per
  # workflow rule on every run (~8-15 min for cutadapt+STAR+DESeq2+
  # qualimap+rseqc envs). Bumped to 30 min to leave headroom for the
  # actual pipeline after env setup. A persistent shared conda cache
  # would be the proper long-term fix; for now we eat the per-run cost.
  time: "00:30:00"
  output: slurm-%j.out
  error: slurm-%j.err
  pre_cmds:
    - 'source /etc/profile.d/lmod.sh 2>/dev/null || source /etc/profile.d/modules.sh'
    - 'module load gcc/11.4.0/openmpi/5.0.5-x2kvx5l'
    - 'mkdir -p /home/llogan/iowarp_prte_tmp'
    - 'mkdir -p /home/llogan/jarvis-runs/rna_seq_star_deseq2_nfs_4n'

pkgs:
  - pkg_type: builtin.rna_seq_star_deseq2
    pkg_name: rna_seq_star_deseq2
    nprocs: 1
    cores: 16
    # Restored to parallel_reps=2 + replicates=8 now that:
    # (1) tmp_bind_root makes /tmp per-host NVMe (no cross-host collision)
    # (2) pkg.py inline sets RNASEQ_SCRATCH_DIR=/tmp/rnaseq-scratch-$rep
    #     (per-rep subdir within per-host /tmp — no within-host collision)
    # The SIF script honors RNASEQ_SCRATCH_DIR (line: WORKDIR="${RNASEQ_SCRATCH_DIR:-/tmp/rnaseq-scratch}").
    replicates: 8
    parallel_reps: 2
    omp_threads: 4
    parallel_scratch_root: /tmp
    out: ${HOME}/jarvis-runs/rna_seq_star_deseq2_nfs_4n
