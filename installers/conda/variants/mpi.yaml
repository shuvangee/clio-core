# IOWarp Core - MPI Variant (Source Build)
# Custom build with MPI support enabled
#
# Usage: IOWARP_PRESET=custom conda build installers/conda/ -c conda-forge

preset:
  - custom

build_type:
  - Release

cuda_enabled:
  - "OFF"
rocm_enabled:
  - "OFF"

mpi_enabled:
  - "ON"
mpi_impl:
  - openmpi  # Change to mpich or msmpi as needed

runtime_enabled:
  - "ON"
cte_enabled:
  - "ON"
cae_enabled:
  - "ON"
cee_enabled:
  - "ON"

zmq_enabled:
  - "ON"
hdf5_enabled:
  - "ON"
elf_enabled:
  - "OFF"
