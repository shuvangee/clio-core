# IOWarp Core - CUDA Variant
# CUDA-enabled build using CMakePresets.json "cuda-release" preset
# (producer-only GPU; preset renamed from "cuda-debug" in the GPU2CPU refactor)
#
# Usage: IOWARP_PRESET=cuda-release conda build installers/conda/ -c conda-forge

preset:
  - cuda-release

cuda_enabled:
  - "ON"
rocm_enabled:
  - "OFF"
mpi_enabled:
  - "OFF"
mpi_impl:
  - nompi
